<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZhikunCode - 系统架构工程大图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0B0D17; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
.blueprint-container { width: 100%; max-width: 1400px; }
svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 8px 32px rgba(0,0,0,0.45)); }
@keyframes flowParticle { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }
@keyframes flowReverse { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 40; } }
@keyframes breathe { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
@keyframes pulseGlow { 0%,100% { filter: drop-shadow(0 0 3px currentColor); } 50% { filter: drop-shadow(0 0 12px currentColor); } }
@keyframes pulseFlowLine { 0% { stroke-dashoffset: 40; opacity: 0.6; } 50% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 0.6; } }
@keyframes subtlePulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="blueprint-container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 4350" preserveAspectRatio="xMidYMin meet">
<defs>
  <!-- Circuit board grid pattern -->
  <pattern id="circuitGrid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">

    <circle cx="0" cy="0" r="1.2" fill="#1a3a5c" opacity="0.12"/>
    <circle cx="50" cy="50" r="1.2" fill="#1a3a5c" opacity="0.12"/>
  </pattern>
  <!-- Gradient definitions -->
  <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#0091ea" stop-opacity="0.8"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffd740" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.8"/>

  <filter id="glowGreen" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="3" result="blur"/><feFlood flood-color="#10B981" flood-opacity="0.3" result="color"/><feComposite in="color" in2="blur" operator="in" result="colorBlur"/><feMerge><feMergeNode in="colorBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glowRed" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feFlood flood-color="#DC4A5C" flood-opacity="0.25" result="color"/><feComposite in="color" in2="blur" operator="in" result="colorBlur"/><feMerge><feMergeNode in="colorBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

  <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>

  <linearGradient id="aposGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#059669" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="securityRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#DC4A5C" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#B83A4B" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6366F1" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="tealPipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0891b2" stop-opacity="0.7"/>
  </linearGradient>
  <filter id="glowTeal" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="3" result="blur"/><feFlood flood-color="#06b6d4" flood-opacity="0.3" result="color"/><feComposite in="color" in2="blur" operator="in" result="colorBlur"/><feMerge><feMergeNode in="colorBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <!-- Arrow marker -->
  <marker id="arrowGold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#ffd740"/></marker>

<!-- Background -->
<rect width="1400" height="4350" fill="#0B0D17"/>
<rect width="1400" height="4350" fill="url(#circuitGrid)"/>

<!-- ═══════════════════════ TITLE SECTION ═══════════════════════ -->
<g transform="translate(700, 50)">
  <text x="0" y="42" text-anchor="middle" fill="#00e5ff" font-size="52" font-weight="800" filter="url(#glowCyan)" style="animation: breathe 4s infinite">ZhikunCode</text>

    <text x="10" y="53" fill="#8da4b0" font-size="9">深色主题 · CSS变量驱动适配</text>

<g transform="translate(40, 440)">
