name: Task 3-5 Differential Upgrade Regression
# 引用：docs/Task3-5差异化升级功能测试方案.md §11.9

on:
  pull_request:
    paths:
      - 'backend/src/main/java/com/aicodeassistant/coordinator/**'
      - 'backend/src/main/java/com/aicodeassistant/engine/VisualizationIntent*'
      - 'backend/src/main/java/com/aicodeassistant/service/browser/**'
      - 'backend/src/main/java/com/aicodeassistant/command/impl/BrowserSnapshotCommand*'
      - 'frontend/src/components/visualization/shared/AgentDAGChart.tsx'
      - 'frontend/src/components/browser/BrowserReplayTimeline.tsx'
      - 'frontend/src/store/coordinatorStore.ts'
      - 'python-service/src/services/browser_service.py'
      - 'scripts/task3-5-*.sh'
      - 'scripts/cross-module-regression.sh'
      - '.github/workflows/task3-5-regression.yml'
  schedule:
    - cron: '0 18 * * *'   # 每日 UTC 18:00 跑 P1 nightly
  workflow_dispatch:

jobs:
  p0-smoke:
    name: P0 Smoke (6 红线 + 编译门)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Precheck
        run: ./scripts/task3-5-precheck.sh || true

      - name: Backend unit (P0 tests)
        working-directory: backend
        run: ./mvnw -q test -DskipITs -Dtest='CoordinatorEventBusTest,VisualizationIntentClassifierTest'

      - name: Frontend install + unit
        working-directory: frontend
        run: |
          npm ci
          npm run test:run

      - name: Python install + unit
        working-directory: python-service
        run: |
          pip install -e '.[test]'
          pytest -q tests/

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: P0 E2E (TC-T3-SEC-01 / TC-T4-E2E-01 / TC-T5-SEC-03/04)
        working-directory: frontend
        env:
          CI: 'true'
        run: npx playwright test e2e/task3-5-differential-upgrade.spec.ts --grep 'TC-T3-SEC-01|TC-T4-E2E-01|TC-T5-SEC-03|TC-T5-SEC-04'

      - name: Upload test results on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-5-p0-results
          path: |
            docs/test-results/
            frontend/playwright-report/
          retention-days: 14

  p1-nightly:
    name: P1 Nightly (全 E2E + 覆盖率门)
    if: github.event_name == 'schedule'
    needs: p0-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: corretto, java-version: '21', cache: maven }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Backend coverage
        working-directory: backend
        run: ./mvnw -q verify -Pcoverage -DcoverageFailOnViolation=true

      - name: Frontend coverage
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      - name: Python coverage
        working-directory: python-service
        run: |
          pip install -e '.[test]'
          pytest --cov=src --cov-fail-under=70 --cov-report=xml:../docs/test-results/coverage/python.xml

      - name: Full E2E
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          npx playwright test --grep 'TC-T[345]-E2E|TC-T[35]-SEC|TC-X'

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-5-p1-nightly
          path: docs/test-results/
          retention-days: 30
