# AI Code Assistant Backend
server:
  port: 8080

spring:
  application:
    name: ai-code-assistant
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Python 服务配置
python:
  service:
    host: 127.0.0.1
    port: 8000
    health-check-interval: 30000

# LLM 配置 - 阿里云百炼 (通义千问)
llm:
  provider: openai
  openai:
    # 阿里云百炼 API Key — 从环境变量读取，禁止硬编码
    api-key: ${LLM_API_KEY:}
    # 阿里云百炼 OpenAI 兼容端点
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # 默认模型
    default-model: qwen3.6-plus
    # 支持的模型列表
    models: qwen3.6-plus,qwen-max,qwen-plus,qwen-turbo,qwen-coder-plus
  http:
    pool:
      max-idle-connections: 5
      keep-alive-seconds: 30
    connect-timeout-seconds: 10
    write-timeout-seconds: 10
    retry-on-failure: true

# 特性标志
features:
  flags:
    THINKING_MODE: false
    TOOL_SEARCH: false
    SANDBOX_DEFAULT_ON: false
    CLASSIFIER_V2: false
    ENABLE_AGENT_SWARMS: false
    MCP_SKILLS: false

# MCP 配置 - 阿里云百炼 MCP 服务
mcp:
  servers:
    # 智谱 WebSearch MCP (通过阿里云百炼)
    zhipu-websearch:
      type: SSE
      url: https://dashscope.aliyuncs.com/api/v1/mcps/zhipu-websearch/sse
      headers:
        Authorization: Bearer ${LLM_API_KEY:}
      scope: USER

# 沙箱配置
sandbox:
  enabled: false
  image: ai-code-assistant-sandbox:latest
  timeout-seconds: 300
  memory-limit: 512m

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-produces-media-type: application/json

# 日志配置 — 详细配置见 log4j2.xml
# Log4j2 由 spring-boot-starter-log4j2 自动加载 classpath:log4j2.xml
logging:
  config: classpath:log4j2.xml

# 应用配置
app:
  security:
    path-validation:
      enabled: true
      project-boundary-check: true
      symlink-resolution: true
  memory:
    team-memories-enabled: true
    max-age-days: 90
    auto-purge: true
  compact:
    session-memory-compact-enabled: true
    smc-min-tokens: 10000
    smc-max-tokens: 40000
  settings:
    watch-enabled: true
    watch-interval-ms: 5000
  mcp:
    channel-permissions-enabled: true
    health-check-interval-ms: 30000
    max-reconnect-attempts: 5
  bridge:
    enabled: true
    max-sessions: 5
    session-timeout-hours: 24
  model:
    # 默认模型（千问示例）
    default: qwen3.6-plus
    # 降级链 — 按性能从高到低
    tier-chain:
      - qwen3.6-plus
      - qwen-plus
      - qwen-turbo
    # 降级时是否自动剥离 thinking blocks
    strip-thinking-on-downgrade: true

# Spring Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  metrics:
    tags:
      application: zhikuncode
