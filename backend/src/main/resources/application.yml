# AI Code Assistant Backend
server:
  port: 8080

spring: 
  application:
    name: ai-code-assistant
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Python 服务配置
python:
  service:
    host: 127.0.0.1
    port: 8000
    health-check-interval: 30000

# LLM 配置 - 阿里云百炼 (通义千问)
llm:
  provider: openai
  openai:
    # 阿里云百炼 API Key — 从环境变量读取，禁止硬编码
    api-key: ${LLM_API_KEY:sk-93625146d2c343d78735213013794ed5}
    # 阿里云百炼 OpenAI 兼容端点
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # 默认模型
    default-model: qwen3.6-plus
    # 支持的模型列表
    models: qwen3.6-plus,qwen-max,qwen-plus,qwen-turbo,qwen-coder-plus
  http:
    pool:
      max-idle-connections: 5
      keep-alive-seconds: 30
    connect-timeout-seconds: 10
    write-timeout-seconds: 10
    retry-on-failure: true

# 子代理模型别名映射
# Claude 系列别名 → 实际部署模型（可通过环境变量 AGENT_MODEL_<ALIAS> 覆盖）
agent:
  model-aliases:
    haiku: qwen-plus
    sonnet: qwen3.6-plus
    opus: qwen-max

# 分类器模型配置（留空则按四级回退: env → 此配置 → lightweight → default）
classifier:
  model: ""

# 特性标志
features:
  flags:
    THINKING_MODE: false
    TOOL_SEARCH: false
    SANDBOX_DEFAULT_ON: false
    CLASSIFIER_V2: false
    ENABLE_AGENT_SWARMS: true
    MCP_SKILLS: false
    COORDINATOR_MODE: true
    # ── A 组：SystemPrompt 动态段 ──
    TOKEN_BUDGET: false          # A1: 默认关闭，用户指定 token 目标时手动开启
    SCRATCHPAD: true              # A3: 必须默认开启，否则已有功能回退
    CACHED_MICROCOMPACT: true     # A4: FRC 总开关
    FRC_SUPPORTED_MODELS: "haiku,sonnet"  # A4: FRC 支持的模型模式
    FRC_KEEP_RECENT: 3            # A4: FRC 保留最近 N 条工具结果
    # ── B 组：P2 实验性工具 ──
    AGENT_TRIGGERS: false         # B2: CronTool 门控，默认关闭
    WEB_BROWSER_TOOL: true        # B3: WebBrowserTool 门控，测试启用
    GIT_ENHANCED_TOOL: ${GIT_ENHANCED_TOOL:true}   # B4: GitTool 门控，默认开启（只读工具）
    RESOURCE_MONITOR: ${RESOURCE_MONITOR:false}    # B5: MonitorTool 门控，默认关闭

# MCP 配置 - 阿里云百炼 MCP 服务
mcp:
  capability-registry-path: ${user.dir}/../configuration/mcp/mcp_capability_registry.json
  servers:
    # 智谱 WebSearch MCP (通过阿里云百炼)
    zhipu-websearch:
      type: SSE
      url: https://dashscope.aliyuncs.com/api/v1/mcps/zhipu-websearch/sse
      headers:
        Authorization: Bearer ${LLM_API_KEY:sk-93625146d2c343d78735213013794ed5}
      scope: USER

# 沙箱配置
sandbox:
  enabled: true
  image: ai-code-assistant-sandbox:latest
  timeout-seconds: 300
  memory-limit: 512m
  network-enabled: false
  mount-mode: ro

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-produces-media-type: application/json

# 日志配置 — 详细配置见 log4j2.xml
# Log4j2 由 spring-boot-starter-log4j2 自动加载 classpath:log4j2.xml
logging:
  config: classpath:log4j2.xml

# 应用配置
app:
  security:
    path-validation:
      enabled: true
      project-boundary-check: true
      symlink-resolution: true
  memory:
    team-memories-enabled: true
    max-age-days: 90
    auto-purge: true
    rerank-enabled: true
    rerank-timeout-ms: 3000
  compact:
    session-memory-compact-enabled: true
    smc-min-tokens: 10000
    smc-max-tokens: 40000
  settings:
    watch-enabled: true
    watch-interval-ms: 5000
  mcp:
    channel-permissions-enabled: true
    health-check-interval-ms: 30000
    max-reconnect-attempts: 5
  bridge:
    enabled: true
    max-sessions: 5
    session-timeout-hours: 24
  model:
    # 默认模型（千问示例）
    default: qwen3.6-plus
    # 降级链 — 按性能从高到低
    tier-chain:
      - qwen3.6-plus
      - qwen-plus
      - qwen-turbo
    # 降级时是否自动剥离 thinking blocks
    strip-thinking-on-downgrade: true

# Spring Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: zhikuncode
