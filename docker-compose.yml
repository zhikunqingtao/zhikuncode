# =============================================================================
# ZhikunCode — Docker Compose (Production)
# =============================================================================
# Usage:
#   docker compose up -d          # Start in background
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop and remove
#   docker compose up --build     # Rebuild and start
# =============================================================================

services:
  zhikuncode:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: zhikuncode:latest
    container_name: zhikuncode
    ports:
      - "${ZHIKUN_PORT:-8080}:8080"
    environment:
      # ---- Required ----
      - LLM_API_KEY=${LLM_API_KEY:?Please set LLM_API_KEY in .env file}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-production}
      - "JAVA_OPTS=${JAVA_OPTS:--Xms256m -Xmx1024m --enable-preview}"
      # ---- Optional (LLM) ----
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-qwen3.6-plus}
      - LLM_MODELS=${LLM_MODELS:-qwen3.6-plus,qwen-max,qwen-plus,qwen-turbo,qwen-coder-plus}
      # ---- Optional (Docker Advanced) — has Dockerfile defaults, override if needed ----
      # Private network access: allows Docker bridge network IPs to bypass auth
      # - ALLOW_PRIVATE_NETWORK=${ALLOW_PRIVATE_NETWORK:-true}
      # Container log directory
      # - LOG_DIR=${LOG_DIR:-/app/log}
      # MCP capability registry path
      # - MCP_REGISTRY_PATH=${MCP_REGISTRY_PATH:-/app/configuration/mcp/mcp_capability_registry.json}
      # ---- Internal ----
      - PYTHON_SERVICE_HOST=127.0.0.1
      - PYTHON_SERVICE_PORT=8000
      - SPRING_WEB_RESOURCES_STATIC_LOCATIONS=classpath:/static/,file:/app/static/
    volumes:
      # Persistent data (SQLite DB, session data, memories)
      - zhikun-data:/app/data
      # User workspace mount (the code project to work on)
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
      # Optional: persist logs to host
      # - ./logs:/app/log
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

volumes:
  zhikun-data:
    driver: local
